<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#2c2c31"/>
      <stop offset="1" stop-color="#111113"/>
    </linearGradient>

    <!-- gold body: bright top-left to deep bottom-right -->
    <linearGradient id="gold" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#FFE9A6"/>
      <stop offset="0.45" stop-color="#F3C244"/>
      <stop offset="0.78" stop-color="#D69A1E"/>
      <stop offset="1" stop-color="#B0730E"/>
    </linearGradient>

    <!-- top face: lighter, catches the light -->
    <linearGradient id="goldTop" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#FFF6D2"/>
      <stop offset="1" stop-color="#F6CD5A"/>
    </linearGradient>

    <!-- soft sheen sweeping across the bar faces -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- champagne trend, distinct from the deeper bar gold -->
    <linearGradient id="trend" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#F6D57A"/>
      <stop offset="1" stop-color="#FFF3C0"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- upward trend, drawn behind the bars, warm champagne gold with a soft glow -->
  <g filter="url(#glow)">
    <polyline points="132,238 200,206 262,168 366,120"
      fill="none" stroke="url(#trend)" stroke-width="18"
      stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M342 108 L384 116 L358 150 Z" fill="#FFF3C0"/>
  </g>

  <!-- gold bars: two bold, clearly separated 3D ingots -->
  <g filter="url(#drop)">
    <!-- bottom bar -->
    <path d="M150 384 L362 384 L386 446 L126 446 Z" fill="url(#gold)"/>
    <path d="M150 384 L362 384 L340 356 L172 356 Z" fill="url(#goldTop)"/>
    <path d="M150 384 L362 384 L386 446 L126 446 Z" fill="url(#sheen)"/>
    <path d="M150 384 L362 384" stroke="#9c6410" stroke-width="2" opacity="0.55"/>
  </g>

  <!-- soft contact shadow so the top bar clearly sits above the base -->
  <ellipse cx="256" cy="358" rx="82" ry="13" fill="#5a3906" opacity="0.4" filter="url(#glow)"/>

  <!-- top bar -->
  <g filter="url(#drop)">
    <path d="M196 300 L316 300 L330 338 L182 338 Z" fill="url(#gold)"/>
    <path d="M196 300 L316 300 L300 276 L212 276 Z" fill="url(#goldTop)"/>
    <path d="M196 300 L316 300 L330 338 L182 338 Z" fill="url(#sheen)"/>
    <path d="M196 300 L316 300" stroke="#9c6410" stroke-width="2" opacity="0.55"/>
  </g>
</svg>
